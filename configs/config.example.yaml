# Horde Credentials
horde:
  api_key: "0000000000"  # Your aihorde.net API key
  url: "https://aihorde.net"

# Worker Parameters
worker:
  name: "ScribeWorker"
  max_threads: 1
  max_length: 512
  max_context_length: 8192
  models_to_serve: 
    - "*"  # Use "*" for auto-detection or specify model names
  nsfw: true
  blacklist: []
  require_upfront_kudos: false
  
  # WebUI Dashboard
  webui_enabled: true
  webui_port: 8082

# Backend Inference Settings
backend:
  url: "http://localhost:5001"  # KoboldCpp / llama.cpp server URL
  api_key: ""                   # Optional Authorization header
  timeout: 300

# Resilience & Retries
resilience:
  backend_timeout: 300
  backend_health_interval: 30
  horde_heartbeat_interval: 300

# Logging
log_level: "INFO"
