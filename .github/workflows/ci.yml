name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install Dependencies
      run: uv sync --frozen

    - name: Run Tests
      run: uv run pytest
      
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test # Ensure tests pass before testing docker build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image (Dry Run)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ai-horde-nexus/scribe-worker:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
